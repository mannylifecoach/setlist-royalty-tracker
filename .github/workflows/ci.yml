name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Lint + test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm test

  audit:
    name: npm audit (high)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # NOTE: report-only until existing high/critical vulns are cleaned up.
    # Flip `continue-on-error` to false to make this a gating check.
    # Tracking card: "[Infra] Tighten npm audit CI gate to fail on high".
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --ignore-scripts

      - name: Run npm audit
        run: npm audit --audit-level=high

      - name: Run npm audit (extension)
        working-directory: extension
        run: npm audit --audit-level=high
