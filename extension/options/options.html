<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div id="app">
    <h1>BMI Live Auto-Fill Settings</h1>
    <p class="subtitle">Connect to your Setlist Royalty Tracker account</p>

    <div class="form-group">
      <label for="apiUrl">App URL</label>
      <input type="url" id="apiUrl" placeholder="https://your-app.vercel.app" value="https://setlistroyalty.com" />
      <span class="hint">The URL where your Setlist Royalty Tracker is hosted</span>
    </div>

    <div class="form-group">
      <label for="apiKey">API Key</label>
      <input type="password" id="apiKey" placeholder="srt_..." />
      <span class="hint">Generate this in Settings → Chrome Extension</span>
    </div>

    <div class="actions">
      <button id="save" class="btn btn-primary">Save</button>
      <button id="test" class="btn">Test Connection</button>
    </div>

    <div id="status"></div>

    <hr style="margin: 24px 0; border: none; border-top: 1px solid #ddd" />

    <h2 style="font-size: 14px; margin-top: 0">Advanced ASCAP fill</h2>
    <div class="form-group">
      <label style="display: flex; gap: 8px; align-items: flex-start; font-weight: normal; cursor: pointer">
        <input type="checkbox" id="advancedFillEnabled" checked style="margin-top: 3px" />
        <span>
          <strong>Enable advanced fill for ASCAP OnStage</strong> (recommended)
          <span class="hint" style="display: block; margin-top: 4px">
            ASCAP's form rejects programmatic input on Submit unless typed via real keyboard events.
            With this enabled, the extension briefly uses Chrome's developer protocol to type the
            Performers field — you'll see a "DevTools is debugging this tab" banner for ~300ms
            during auto-fill. Without this enabled, you'll need to type Performers manually.
          </span>
        </span>
      </label>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
